<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 'nunito': ['Nunito', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    :root {
      --sky-blue: #4FC3F7;
      --bright-yellow: #FFD54F;
      --candy-pink: #FF80AB;
      --mint-green: #A5D6A7;
      --neon-pink: #FF6EC7;
      --neon-blue: #00E5FF;
      --gold: #FFD700;
      --gold-dark: #FFA000;
      --bg-light: #FFF8F0;
      --card-back-1: #4FC3F7;
      --card-back-2: #FF80AB;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg-light);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating background decorations */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    .bg-shape:nth-child(1) {
      width: 200px;
      height: 200px;
      background: var(--sky-blue);
      top: -50px;
      left: -50px;
      animation: floatShape 20s ease-in-out infinite;
    }

    .bg-shape:nth-child(2) {
      width: 150px;
      height: 150px;
      background: var(--candy-pink);
      top: 30%;
      right: -40px;
      animation: floatShape 25s ease-in-out infinite reverse;
    }

    .bg-shape:nth-child(3) {
      width: 180px;
      height: 180px;
      background: var(--bright-yellow);
      bottom: 10%;
      left: 10%;
      animation: floatShape 22s ease-in-out infinite 3s;
    }

    .bg-shape:nth-child(4) {
      width: 120px;
      height: 120px;
      background: var(--mint-green);
      top: 60%;
      right: 15%;
      animation: floatShape 18s ease-in-out infinite 5s;
    }

    .bg-shape:nth-child(5) {
      width: 100px;
      height: 100px;
      background: var(--neon-pink);
      bottom: -30px;
      right: 30%;
      animation: floatShape 24s ease-in-out infinite 2s;
    }

    .bg-shape:nth-child(6) {
      width: 160px;
      height: 160px;
      background: var(--neon-blue);
      top: 10%;
      left: 40%;
      animation: floatShape 28s ease-in-out infinite 4s;
    }

    @keyframes floatShape {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(30px, -20px) scale(1.05);
      }

      50% {
        transform: translate(-20px, 30px) scale(0.95);
      }

      75% {
        transform: translate(20px, 20px) scale(1.02);
      }
    }

    /* Screen transitions */
    .screen {
      display: none;
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    .screen.active {
      display: flex;
      animation: screenIn 0.5s ease-out;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Welcome Screen */
    .title-text {
      font-size: clamp(2.8rem, 8vw, 5rem);
      font-weight: 900;
      background: linear-gradient(135deg, var(--sky-blue), var(--neon-pink), var(--bright-yellow), var(--mint-green));
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      line-height: 1.2;
      text-align: center;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .title-glow {
      text-shadow: none;
      filter: drop-shadow(0 0 20px rgba(255, 110, 199, 0.3));
    }

    /* Difficulty cards */
    .diff-card {
      background: white;
      border-radius: 20px;
      padding: 1.5rem 1.2rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 3px solid transparent;
      position: relative;
      overflow: hidden;
      text-align: center;
      min-width: 130px;
    }

    .diff-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 17px;
    }

    .diff-card:hover {
      transform: translateY(-6px) scale(1.03);
    }

    .diff-card.selected {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: translateY(-4px) scale(1.02);
    }

    .diff-card.selected::before {
      opacity: 1;
    }

    .diff-card.easy {
      box-shadow: 0 4px 15px rgba(165, 214, 167, 0.3);
    }

    .diff-card.easy::before {
      background: linear-gradient(135deg, rgba(165, 214, 167, 0.1), rgba(165, 214, 167, 0.05));
    }

    .diff-card.easy.selected {
      box-shadow: 0 4px 20px rgba(165, 214, 167, 0.5), 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .diff-card.medium {
      box-shadow: 0 4px 15px rgba(79, 195, 247, 0.3);
    }

    .diff-card.medium::before {
      background: linear-gradient(135deg, rgba(79, 195, 247, 0.1), rgba(79, 195, 247, 0.05));
    }

    .diff-card.medium.selected {
      box-shadow: 0 4px 20px rgba(79, 195, 247, 0.5), 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .diff-card.hard {
      box-shadow: 0 4px 15px rgba(255, 128, 171, 0.3);
    }

    .diff-card.hard::before {
      background: linear-gradient(135deg, rgba(255, 128, 171, 0.1), rgba(255, 128, 171, 0.05));
    }

    .diff-card.hard.selected {
      box-shadow: 0 4px 20px rgba(255, 128, 171, 0.5), 0 0 20px rgba(255, 215, 0, 0.3);
    }

    /* Start button */
    .start-btn {
      background: linear-gradient(135deg, var(--bright-yellow), var(--gold));
      color: #5D4037;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      padding: 1rem 3rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 20px rgba(255, 213, 79, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.4);
      position: relative;
      overflow: hidden;
    }

    .start-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255, 255, 255, 0.3) 50%, transparent 60%);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%) rotate(45deg);
      }

      100% {
        transform: translateX(100%) rotate(45deg);
      }
    }

    .start-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 213, 79, 0.5);
    }

    .start-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Game Screen */
    .game-header {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid rgba(0, 0, 0, 0.05);
    }

    .stat-box {
      background: white;
      border-radius: 14px;
      padding: 0.5rem 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      text-align: center;
      min-width: 80px;
    }

    .stat-value {
      font-weight: 900;
      font-size: 1.3rem;
      color: #333;
    }

    .stat-label {
      font-size: 0.7rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Card Grid */
    .game-grid {
      display: grid;
      gap: 8px;
      justify-content: center;
      padding: 1rem;
      max-width: 700px;
      margin: 0 auto;
    }

    .game-grid.cols-4 {
      grid-template-columns: repeat(4, 1fr);
      max-width: 520px;
    }

    .game-grid.cols-6 {
      grid-template-columns: repeat(6, 1fr);
      max-width: 700px;
    }

    /* Card */
    .card {
      perspective: 800px;
      cursor: pointer;
      aspect-ratio: 3 / 4;
      opacity: 0;
      animation: cardDeal 0.4s ease-out forwards;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
    }

    .card:not(.flipped):not(.matched):hover .card-inner {
      transform: scale(1.06);
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Card Back */
    .card-back {
      background: linear-gradient(135deg, var(--card-back-1), var(--card-back-2));
      border: 3px solid rgba(255, 255, 255, 0.6);
      position: relative;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 2px dashed rgba(255, 255, 255, 0.45);
      border-radius: 8px;
    }

    .card-back-icon {
      font-size: 1.5rem;
      color: rgba(255, 255, 255, 0.7);
      z-index: 1;
    }

    /* Card Front */
    .card-front {
      transform: rotateY(180deg);
      background: white;
      border: 3px solid #f0f0f0;
      flex-direction: column;
      gap: 2px;
    }

    .card-symbol {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      line-height: 1;
    }

    /* Card states */
    .card.matched .card-front {
      border-color: var(--gold);
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      background: linear-gradient(135deg, #FFFDE7, #FFF8E1);
    }

    .card.matched .card-inner {
      animation: matchPulse 0.6s ease;
    }

    .card.shake .card-inner {
      animation: cardShake 0.4s ease;
    }

    @keyframes cardDeal {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.85);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes matchPulse {
      0% {
        transform: rotateY(180deg) scale(1);
      }

      50% {
        transform: rotateY(180deg) scale(1.1);
      }

      100% {
        transform: rotateY(180deg) scale(1);
      }
    }

    @keyframes cardShake {

      0%,
      100% {
        transform: rotateY(180deg) translateX(0);
      }

      20% {
        transform: rotateY(180deg) translateX(-6px);
      }

      40% {
        transform: rotateY(180deg) translateX(6px);
      }

      60% {
        transform: rotateY(180deg) translateX(-4px);
      }

      80% {
        transform: rotateY(180deg) translateX(4px);
      }
    }

    /* Match particles */
    .match-particle {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      font-size: 1.2rem;
      animation: particleBurst 0.8s ease-out forwards;
    }

    @keyframes particleBurst {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.3);
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: white;
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      font-weight: 900;
      font-size: 1.1rem;
      z-index: 200;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      opacity: 0;
      animation: toastPop 1.2s ease forwards;
      pointer-events: none;
    }

    @keyframes toastPop {
      0% {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px) scale(0.8);
      }

      20% {
        opacity: 1;
        transform: translateX(-50%) translateY(0) scale(1.05);
      }

      40% {
        transform: translateX(-50%) translateY(0) scale(1);
      }

      80% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        transform: translateX(-50%) translateY(-15px);
      }
    }

    /* Win Screen */
    .win-screen {
      background: rgba(255, 248, 240, 0.95);
      backdrop-filter: blur(10px);
    }

    .stars-display .star {
      font-size: 3rem;
      color: #e0e0e0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-block;
    }

    .stars-display .star.earned {
      color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.5));
      animation: starPop 0.5s ease backwards;
    }

    @keyframes starPop {
      from {
        transform: scale(0) rotate(-30deg);
      }

      to {
        transform: scale(1) rotate(0deg);
      }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      z-index: 150;
      pointer-events: none;
      animation: confettiFall var(--duration) linear forwards;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg);
      }
    }

    /* Game control buttons */
    .game-btn {
      background: white;
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 0.5rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }

    .game-btn:hover {
      border-color: var(--sky-blue);
      color: var(--sky-blue);
      transform: translateY(-1px);
    }

    /* Result stat cards */
    .result-stat {
      background: white;
      border-radius: 16px;
      padding: 1rem 1.5rem;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
      text-align: center;
    }

    .result-stat .value {
      font-size: 2rem;
      font-weight: 900;
    }

    .result-stat .label {
      font-size: 0.8rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Play again button */
    .play-again-btn {
      background: linear-gradient(135deg, var(--candy-pink), var(--neon-pink));
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 20px rgba(255, 110, 199, 0.35);
    }

    .play-again-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }

    .play-again-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .game-grid {
        gap: 5px;
        padding: 0.5rem;
      }

      .game-grid.cols-6 {
        grid-template-columns: repeat(4, 1fr);
        max-width: 400px;
      }

      .stat-box {
        padding: 0.4rem 0.6rem;
        min-width: 65px;
      }

      .stat-value {
        font-size: 1rem;
      }

      .card-back-icon {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body>
  <!-- Floating background shapes -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>

  <!-- Welcome Screen -->
  <div id="welcomeScreen" class="screen active flex-col items-center justify-center px-4 py-8">
    <div class="text-center max-w-lg mx-auto">
      <!-- Decorative icons above title -->
      <div class="flex justify-center gap-3 mb-4 text-2xl">
        <span style="animation: floatShape 3s ease-in-out infinite;">🌟</span>
        <span style="animation: floatShape 3s ease-in-out infinite 0.5s;">🎈</span>
        <span style="animation: floatShape 3s ease-in-out infinite 1s;">🦋</span>
      </div>

      <h1 class="title-text title-glow mb-3">Memory Match</h1>
      <p class="text-gray-400 font-bold text-lg mb-10">Flip, Find, and Match the Pairs!</p>

      <!-- Difficulty Selection -->
      <p class="text-gray-500 font-bold text-sm uppercase tracking-wider mb-4">Choose Difficulty</p>
      <div class="flex flex-wrap justify-center gap-4 mb-10">
        <div class="diff-card easy" data-difficulty="easy" onclick="selectDifficulty('easy')" role="button" tabindex="0"
          aria-label="Easy difficulty, 4 by 3 grid">
          <div class="text-3xl mb-2">🌱</div>
          <div class="font-black text-gray-700 text-base">Simple</div>
          <div class="text-xs text-gray-400 mt-1">4 x 3 Grid</div>
          <div class="text-xs font-bold text-green-400 mt-1">6 Pairs</div>
        </div>
        <div class="diff-card medium selected" data-difficulty="medium" onclick="selectDifficulty('medium')"
          role="button" tabindex="0" aria-label="Medium difficulty, 4 by 4 grid">
          <div class="text-3xl mb-2">⚡</div>
          <div class="font-black text-gray-700 text-base">Medium</div>
          <div class="text-xs text-gray-400 mt-1">4 x 4 Grid</div>
          <div class="text-xs font-bold text-blue-400 mt-1">8 Pairs</div>
        </div>
        <div class="diff-card hard" data-difficulty="hard" onclick="selectDifficulty('hard')" role="button" tabindex="0"
          aria-label="Hard difficulty, 6 by 4 grid">
          <div class="text-3xl mb-2">🔥</div>
          <div class="font-black text-gray-700 text-base">Difficult</div>
          <div class="text-xs text-gray-400 mt-1">6 x 4 Grid</div>
          <div class="text-xs font-bold text-pink-400 mt-1">12 Pairs</div>
        </div>
      </div>

      <button class="start-btn" onclick="startGame()" aria-label="Start the game">
        <i class="fa-solid fa-play mr-2"></i> Start Game
      </button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" class="screen flex-col">
    <!-- Header -->
    <header class="game-header sticky top-0 z-10 px-4 py-3">
      <div class="max-w-2xl mx-auto flex items-center justify-between gap-2">
        <button class="game-btn" onclick="goToMenu()" aria-label="Back to menu">
          <i class="fa-solid fa-arrow-left mr-1"></i> Menu
        </button>
        <div class="flex gap-2">
          <div class="stat-box">
            <div class="stat-value" id="movesDisplay">0</div>
            <div class="stat-label">Moves</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="timerDisplay">0:00</div>
            <div class="stat-label">Time</div>
          </div>
          <div class="stat-box">
            <div class="stat-value" id="pairsDisplay">0/0</div>
            <div class="stat-label">Pairs</div>
          </div>
        </div>
        <button class="game-btn" onclick="restartGame()" aria-label="Restart game">
          <i class="fa-solid fa-rotate-right mr-1"></i> Reset
        </button>
      </div>
    </header>

    <!-- Card Grid -->
    <main class="flex-1 flex items-center justify-center py-4">
      <div id="cardGrid" class="game-grid cols-4" role="grid" aria-label="Memory card grid"></div>
    </main>
  </div>

  <!-- Win Screen -->
  <div id="winScreen" class="screen win-screen flex-col items-center justify-center px-4 py-8">
    <div class="text-center max-w-md mx-auto">
      <div class="text-5xl mb-4" style="animation: floatShape 2s ease-in-out infinite;">🎉</div>
      <h2 class="text-4xl font-black mb-2" style="color: var(--gold-dark);">Congratulations!</h2>
      <p class="text-gray-400 font-bold mb-6">You matched all the pairs!</p>

      <!-- Stars -->
      <div class="stars-display mb-8" id="starsDisplay">
        <span class="star" data-star="1"><i class="fa-solid fa-star"></i></span>
        <span class="star" data-star="2"><i class="fa-solid fa-star"></i></span>
        <span class="star" data-star="3"><i class="fa-solid fa-star"></i></span>
      </div>

      <!-- Result Stats -->
      <div class="flex justify-center gap-4 mb-8">
        <div class="result-stat">
          <div class="value" id="resultMoves" style="color: var(--sky-blue);">0</div>
          <div class="label">Moves</div>
        </div>
        <div class="result-stat">
          <div class="value" id="resultTime" style="color: var(--candy-pink);">0:00</div>
          <div class="label">Time</div>
        </div>
      </div>

      <div class="flex flex-col gap-3 items-center">
        <button class="play-again-btn" onclick="restartGame()" aria-label="Play again">
          <i class="fa-solid fa-rotate-right mr-2"></i> Play Again
        </button>
        <button class="game-btn" onclick="goToMenu()" aria-label="Back to menu">
          <i class="fa-solid fa-house mr-1"></i> Main Menu
        </button>
      </div>
    </div>
  </div>

  <script>
    /* ======================= GAME STATE ======================= */
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let totalPairs = 0;
    let moves = 0;
    let timerSeconds = 0;
    let timerInterval = null;
    let isLocked = false;
    let gameStarted = false;
    let difficulty = 'medium';
    let audioCtx = null;

    /* Card symbols - fun and colorful for kids */
    const SYMBOLS = [
      '🌟', '🦋', '🌈', '🎈', '🍭', '🎪',
      '🐱', '🐶', '🌺', '🍎', '🎵', '🦄',
      '🌻', '🍦', '🐰', '🎨', '🍕', '🐸',
      '🌙', '🎃', '🎯', '🐻', '🦊', '🐧'
    ];

    /* Difficulty settings: grid columns, grid rows, total pairs */
    const DIFFICULTY_CONFIG = {
      easy: { cols: 4, rows: 3, pairs: 6 },
      medium: { cols: 4, rows: 4, pairs: 8 },
      hard: { cols: 6, rows: 4, pairs: 12 }
    };

    /* ======================= AUDIO ======================= */
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playTone(freq, duration, type = 'sine', volume = 0.2, delay = 0) {
      if (!audioCtx) return;
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(volume, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
      } catch (e) { }
    }

    function playFlipSound() {
      playTone(880, 0.08, 'sine', 0.15);
      playTone(1100, 0.06, 'sine', 0.1, 0.03);
    }

    function playMatchSound() {
      playTone(523, 0.25, 'sine', 0.2, 0);
      playTone(659, 0.25, 'sine', 0.2, 0.1);
      playTone(784, 0.3, 'sine', 0.25, 0.2);
    }

    function playMismatchSound() {
      playTone(300, 0.15, 'triangle', 0.12, 0);
      playTone(250, 0.2, 'triangle', 0.1, 0.1);
    }

    function playWinSound() {
      const notes = [523, 587, 659, 698, 784, 880, 988, 1047];
      notes.forEach((freq, i) => {
        playTone(freq, 0.3, 'sine', 0.15, i * 0.08);
      });
    }

    /* ======================= SCREENS ======================= */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function selectDifficulty(diff) {
      difficulty = diff;
      document.querySelectorAll('.diff-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`.diff-card[data-difficulty="${diff}"]`).classList.add('selected');
    }

    function goToMenu() {
      stopTimer();
      showScreen('welcomeScreen');
    }

    /* ======================= GAME LOGIC ======================= */
    function startGame() {
      initAudio();
      const config = DIFFICULTY_CONFIG[difficulty];
      totalPairs = config.pairs;
      matchedPairs = 0;
      moves = 0;
      timerSeconds = 0;
      gameStarted = false;
      flippedCards = [];
      isLocked = false;

      stopTimer();
      updateDisplay();
      createCardGrid(config);
      showScreen('gameScreen');
    }

    function restartGame() {
      stopTimer();
      startGame();
    }

    function createCardGrid(config) {
      const grid = document.getElementById('cardGrid');
      grid.innerHTML = '';

      /* Set grid column class */
      grid.className = 'game-grid';
      if (config.cols === 6) {
        grid.classList.add('cols-6');
      } else {
        grid.classList.add('cols-4');
      }

      /* Pick random symbols and create pairs */
      const shuffledSymbols = [...SYMBOLS].sort(() => Math.random() - 0.5);
      const selectedSymbols = shuffledSymbols.slice(0, config.pairs);
      const cardSymbols = [...selectedSymbols, ...selectedSymbols];
      shuffleArray(cardSymbols);

      cards = [];
      cardSymbols.forEach((symbol, index) => {
        const cardData = { id: index, symbol: symbol, flipped: false, matched: false };
        cards.push(cardData);

        const cardEl = document.createElement('div');
        cardEl.className = 'card';
        cardEl.style.animationDelay = `${index * 0.04}s`;
        cardEl.setAttribute('role', 'gridcell');
        cardEl.setAttribute('tabindex', '0');
        cardEl.setAttribute('aria-label', 'Face-down card');
        cardEl.dataset.index = index;

        /* Alternate card back gradients for visual variety */
        const gradients = [
          ['var(--sky-blue)', 'var(--candy-pink)'],
          ['var(--candy-pink)', 'var(--bright-yellow)'],
          ['var(--mint-green)', 'var(--sky-blue)'],
          ['var(--bright-yellow)', 'var(--mint-green)'],
          ['var(--neon-pink)', 'var(--sky-blue)'],
          ['var(--sky-blue)', 'var(--mint-green)'],
        ];
        const gradPair = gradients[index % gradients.length];

        cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-back" style="background: linear-gradient(135deg, ${gradPair[0]}, ${gradPair[1]});">
                            <span class="card-back-icon">✦</span>
                        </div>
                        <div class="card-face card-front">
                            <span class="card-symbol">${symbol}</span>
                        </div>
                    </div>
                `;

        cardEl.addEventListener('click', () => flipCard(index));
        cardEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            flipCard(index);
          }
        });

        grid.appendChild(cardEl);
      });
    }

    function flipCard(index) {
      if (isLocked) return;

      const card = cards[index];
      if (card.flipped || card.matched) return;
      if (flippedCards.length >= 2) return;
      if (flippedCards.length === 1 && flippedCards[0].id === index) return;

      /* Start timer on first flip */
      if (!gameStarted) {
        gameStarted = true;
        startTimer();
      }

      /* Flip the card */
      card.flipped = true;
      flippedCards.push(card);
      const cardEl = document.querySelector(`.card[data-index="${index}"]`);
      cardEl.classList.add('flipped');
      cardEl.setAttribute('aria-label', `Card: ${card.symbol}`);
      playFlipSound();

      /* Check for match when two cards are flipped */
      if (flippedCards.length === 2) {
        moves++;
        updateDisplay();
        checkMatch();
      }
    }

    function checkMatch() {
      const [card1, card2] = flippedCards;
      const el1 = document.querySelector(`.card[data-index="${card1.id}"]`);
      const el2 = document.querySelector(`.card[data-index="${card2.id}"]`);

      if (card1.symbol === card2.symbol) {
        /* Match found */
        isLocked = true;
        setTimeout(() => {
          card1.matched = true;
          card2.matched = true;
          el1.classList.add('matched');
          el2.classList.add('matched');
          matchedPairs++;
          updateDisplay();
          playMatchSound();
          createMatchParticles(el1);
          createMatchParticles(el2);
          showToast('Match Found!', var_candy_pink());
          flippedCards = [];
          isLocked = false;

          if (matchedPairs === totalPairs) {
            setTimeout(showWinScreen, 600);
          }
        }, 300);
      } else {
        /* No match */
        isLocked = true;
        setTimeout(() => {
          el1.classList.add('shake');
          el2.classList.add('shake');
          playMismatchSound();
        }, 400);
        setTimeout(() => {
          card1.flipped = false;
          card2.flipped = false;
          el1.classList.remove('flipped', 'shake');
          el2.classList.remove('flipped', 'shake');
          el1.setAttribute('aria-label', 'Face-down card');
          el2.setAttribute('aria-label', 'Face-down card');
          flippedCards = [];
          isLocked = false;
        }, 1000);
      }
    }

    function var_candy_pink() { return '#FF80AB'; }

    function showWinScreen() {
      stopTimer();
      playWinSound();
      showScreen('winScreen');
      createConfetti();

      /* Set result stats */
      document.getElementById('resultMoves').textContent = moves;
      document.getElementById('resultTime').textContent = formatTime(timerSeconds);

      /* Calculate star rating */
      const ratio = moves / totalPairs;
      let starCount = 1;
      if (ratio <= 1.5) starCount = 3;
      else if (ratio <= 2.5) starCount = 2;

      /* Animate stars */
      document.querySelectorAll('.stars-display .star').forEach((star, i) => {
        star.classList.remove('earned');
        if (i < starCount) {
          setTimeout(() => star.classList.add('earned'), 300 + i * 300);
        }
      });
    }

    /* ======================= TIMER ======================= */
    function startTimer() {
      timerInterval = setInterval(() => {
        timerSeconds++;
        document.getElementById('timerDisplay').textContent = formatTime(timerSeconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    /* ======================= DISPLAY ======================= */
    function updateDisplay() {
      document.getElementById('movesDisplay').textContent = moves;
      document.getElementById('pairsDisplay').textContent = `${matchedPairs}/${totalPairs}`;
    }

    /* ======================= EFFECTS ======================= */
    function createMatchParticles(element) {
      const rect = element.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const particleSymbols = ['⭐', '✨', '💫', '🌟', '✦', '★'];
      const colors = ['#FFD700', '#FF6EC7', '#4FC3F7', '#FFD54F', '#A5D6A7', '#00E5FF'];

      for (let i = 0; i < 8; i++) {
        const particle = document.createElement('div');
        particle.className = 'match-particle';
        const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.5;
        const distance = 40 + Math.random() * 50;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        particle.style.cssText = `
                    left: ${cx}px;
                    top: ${cy}px;
                    --tx: ${tx}px;
                    --ty: ${ty}px;
                    color: ${colors[i % colors.length]};
                `;
        particle.textContent = particleSymbols[i % particleSymbols.length];
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 900);
      }
    }

    function createConfetti() {
      const colors = ['#FFD700', '#FF6EC7', '#4FC3F7', '#FFD54F', '#A5D6A7', '#00E5FF', '#FF80AB', '#E040FB'];
      const shapes = ['circle', 'square', 'triangle'];

      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          const color = colors[Math.floor(Math.random() * colors.length)];
          const size = 6 + Math.random() * 10;
          const left = Math.random() * 100;
          const duration = 2 + Math.random() * 3;
          const shape = shapes[Math.floor(Math.random() * shapes.length)];

          let borderRadius = shape === 'circle' ? '50%' : shape === 'square' ? '2px' : '0';
          let clipPath = shape === 'triangle' ? 'polygon(50% 0%, 0% 100%, 100% 100%)' : 'none';

          piece.style.cssText = `
                        left: ${left}vw;
                        top: -20px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        border-radius: ${borderRadius};
                        clip-path: ${clipPath};
                        --duration: ${duration}s;
                        animation-delay: ${Math.random() * 0.5}s;
                    `;
          document.body.appendChild(piece);
          setTimeout(() => piece.remove(), (duration + 1) * 1000);
        }, i * 30);
      }
    }

    function showToast(message, color = '#FF80AB') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.color = color;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 1300);
    }

    /* ======================= UTILITIES ======================= */
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    /* ======================= KEYBOARD NAVIGATION ======================= */
    document.addEventListener('keydown', (e) => {
      /* Allow Enter/Space on difficulty cards */
      if (e.key === 'Enter' && document.activeElement.classList.contains('diff-card')) {
        const diff = document.activeElement.dataset.difficulty;
        if (diff) selectDifficulty(diff);
      }
    });

    /* ======================= INIT ======================= */
    /* Default difficulty is medium (already selected in HTML) */
  </script>
</body>

</html>
